<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Settings - CommandPilot</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  {{ template "navbar.html" . }}

  <main class="container">
    <section class="page-header">
      <h1>Settings</h1>
      <p>System configuration</p>
    </section>

    <section class="card">
      <h2>Update Setting</h2>
      <form method="POST" action="/update_setting">
        <div class="form-group">
          <label for="key">Key</label>
          <input id="key" name="key" type="text" required>
        </div>

        <div class="form-group">
          <label for="value">Value</label>
          <input id="value" name="value" type="text" required>
        </div>

        <button type="submit">Save Setting</button>
      </form>
    </section>

    <section class="card">
      <h2>Current Settings</h2>
      <table>
        <thead>
          <tr>
            <th>Key</th>
            <th>Value</th>
          </tr>
        </thead>
        <tbody>
          {{ range . }}
          <tr>
            <td>{{ .Key }}</td>
            <td>{{ .Value }}</td>
          </tr>
          {{ else }}
          <tr>
            <td colspan="2">No settings configured.</td>
          </tr>
          {{ end }}
        </tbody>
      </table>
    </section>
  </main>
</body>
</html>
