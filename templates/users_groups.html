<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Administration - CommandPilot</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  {{ template "navbar.html" . }}

  <main class="container">

    <section class="page-header">
      <div>
        <h1>User Administration</h1>
        <p>User accounts, authentication, and access management</p>
      </div>
    </section>

    <section class="dashboard-grid">

      <div class="panel">

        <div class="panel-header">
          <h2>Create User Account</h2>
        </div>

        <div style="padding:24px;">

          <form method="POST" action="/create_user">

            <div class="form-group">
              <label for="username">
                Username
              </label>

              <input
                id="username"
                name="username"
                type="text"
                required
              >
            </div>

            <div class="form-group">
              <label for="password">
                Password
              </label>

              <input
                id="password"
                name="password"
                type="password"
                required
              >
            </div>

            <button
              type="submit"
              class="btn btn-primary"
            >
              Create User
            </button>

          </form>

        </div>

      </div>

      <div class="panel">

        <div class="panel-header">
          <h2>User Directory</h2>
        </div>

        <table class="data-table">

          <thead>
            <tr>
              <th>User ID</th>
              <th>Username</th>
              <th>Assigned Role</th>
            </tr>
          </thead>

          <tbody>

            {{ range . }}

            <tr>
              <td>{{ .ID }}</td>
              <td>{{ .Username }}</td>
              <td>{{ .RoleID }}</td>
            </tr>

            {{ else }}

            <tr>
              <td colspan="3" class="empty-state">
                No user accounts are currently configured.
              </td>
            </tr>

            {{ end }}

          </tbody>

        </table>

      </div>

    </section>

  </main>
</body>
</html>
