<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>History - CommandPilot</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  {{ template "navbar.html" . }}

  <main class="container">
    <h1>History</h1>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Action</th>
          <th>Timestamp</th>
        </tr>
      </thead>
      <tbody>
        {{ range .History }}
        <tr>
          <td>{{ .ID }}</td>
          <td>{{ .Action }}</td>
          <td>{{ .Timestamp }}</td>
        </tr>
        {{ else }}
        <tr>
          <td colspan="3">No history entries.</td>
        </tr>
        {{ end }}
      </tbody>
    </table>
  </main>
</body>
</html>
