<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>History - CommandPilot</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  {{ template "navbar.html" . }}

  <main class="container">
    <section class="page-header">
      <h1>History</h1>
      <p>Action and device activity log</p>
    </section>

    <section class="card">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Action</th>
            <th>Device ID</th>
            <th>Created At</th>
          </tr>
        </thead>
        <tbody>
          {{ range .History }}
          <tr>
            <td>{{ .ID }}</td>
            <td>{{ .Action }}</td>
            <td>{{ .DeviceID }}</td>
            <td>{{ .CreatedAt }}</td>
          </tr>
          {{ else }}
          <tr>
            <td colspan="4">No history entries found.</td>
          </tr>
          {{ end }}
        </tbody>
      </table>
    </section>
  </main>
</body>
</html>
