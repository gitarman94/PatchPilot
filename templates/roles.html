<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Roles - CommandPilot</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  {{ template "navbar.html" . }}

  <main class="container">
    <h1>Roles</h1>

    <section class="card">
      <h2>Create Role</h2>

      <form method="POST" action="/create_role">
        <div class="form-group">
          <label for="name">Role Name</label>
          <input id="name" name="name" type="text" required>
        </div>

        <button type="submit">Create Role</button>
      </form>
    </section>

    <section class="card">
      <h2>Existing Roles</h2>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
          </tr>
        </thead>
        <tbody>
          {{ range .Roles }}
          <tr>
            <td>{{ .ID }}</td>
            <td>{{ .Name }}</td>
          </tr>
          {{ else }}
          <tr>
            <td colspan="2">No roles found.</td>
          </tr>
          {{ end }}
        </tbody>
      </table>
    </section>
  </main>
</body>
</html>
