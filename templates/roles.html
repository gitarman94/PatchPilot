<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Access Roles - CommandPilot</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  {{ template "navbar.html" . }}

  <main class="container">

    <section class="page-header">
      <div>
        <h1>Access Roles</h1>
        <p>Role-based access control and privilege management</p>
      </div>
    </section>

    <section class="dashboard-grid">

      <div class="panel">

        <div class="panel-header">
          <h2>Create Access Role</h2>
        </div>

        <div style="padding:24px;">

          <form method="POST" action="/create_role">

            <div class="form-group">
              <label for="name">
                Role Name
              </label>

              <input
                id="name"
                name="name"
                type="text"
                placeholder="Infrastructure Administrator"
                required
              >
            </div>

            <button
              type="submit"
              class="btn btn-primary"
            >
              Create Role
            </button>

          </form>

        </div>

      </div>

      <div class="panel">

        <div class="panel-header">
          <h2>Defined Roles</h2>
        </div>

        <table class="data-table">

          <thead>
            <tr>
              <th>Role ID</th>
              <th>Role Name</th>
              <th>Description</th>
            </tr>
          </thead>

          <tbody>

            {{ range . }}

            <tr>
              <td>{{ .ID }}</td>
              <td>{{ .Name }}</td>
              <td>{{ .Description }}</td>
            </tr>

            {{ else }}

            <tr>
              <td colspan="3" class="empty-state">
                No access roles are currently defined.
              </td>
            </tr>

            {{ end }}

          </tbody>

        </table>

      </div>

    </section>

  </main>
</body>
</html>
