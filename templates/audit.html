<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Audit - CommandPilot</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  {{ template "navbar.html" . }}

  <main class="container">
    <section class="page-header">
      <h1>Audit Logs</h1>
      <p>Administrative activity record</p>
    </section>

    <section class="card">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>User</th>
            <th>Action</th>
            <th>Target</th>
            <th>Details</th>
            <th>Created At</th>
          </tr>
        </thead>
        <tbody>
          {{ range .Audit }}
          <tr>
            <td>{{ .ID }}</td>
            <td>{{ .User }}</td>
            <td>{{ .Action }}</td>
            <td>{{ .Target }}</td>
            <td>{{ .Details }}</td>
            <td>{{ .CreatedAt }}</td>
          </tr>
          {{ else }}
          <tr>
            <td colspan="6">No audit entries.</td>
          </tr>
          {{ end }}
        </tbody>
      </table>
    </section>
  </main>
</body>
</html>
