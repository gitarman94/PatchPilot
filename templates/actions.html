<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Actions - CommandPilot</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  {{ template "navbar.html" . }}

  <main class="container">
    <h1>Actions</h1>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Device ID</th>
          <th>Status</th>
          <th>Created</th>
          <th>Updated</th>
        </tr>
      </thead>

      <tbody>
        {{ if .actions }}
          {{ range .actions }}
          <tr>
            <td>{{ .ID }}</td>
            <td>{{ .Name }}</td>
            <td>{{ .DeviceID }}</td>
            <td>{{ .Status }}</td>
            <td>{{ .CreatedAt }}</td>
            <td>{{ .UpdatedAt }}</td>
          </tr>
          {{ end }}
        {{ else }}
          <tr>
            <td colspan="6">No actions found.</td>
          </tr>
        {{ end }}
      </tbody>
    </table>
  </main>
</body>
</html>
