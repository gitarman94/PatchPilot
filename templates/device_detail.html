<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Device Detail - CommandPilot</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  {{ template "navbar.html" . }}

  <main class="container">
    <section class="page-header">
      <h1>Device Detail</h1>
      <p>Inventory record and state</p>
    </section>

    {{ if .Device }}
    <section class="card">
      <table>
        <tbody>
          <tr>
            <th>ID</th>
            <td>{{ .Device.ID }}</td>
          </tr>
          <tr>
            <th>Hostname</th>
            <td>{{ .Device.Hostname }}</td>
          </tr>
          <tr>
            <th>IP</th>
            <td>{{ .Device.IP }}</td>
          </tr>
          <tr>
            <th>OS</th>
            <td>{{ .Device.OS }}</td>
          </tr>
          <tr>
            <th>Last Seen</th>
            <td>{{ .Device.LastSeen }}</td>
          </tr>
          <tr>
            <th>Approved</th>
            <td>{{ .Device.Approved }}</td>
          </tr>
        </tbody>
      </table>
    </section>
    {{ else }}
    <section class="card">
      <p>Device not found.</p>
    </section>
    {{ end }}
  </main>
</body>
</html>
